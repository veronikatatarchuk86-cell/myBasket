<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank</title>
    <link rel="stylesheet" href="myBasket.css">
</head>

<body>
  
    <div class="cart-container">
        <h1>🛒 Мій кошик</h1>

        <div id="cart-items" class="cart-items">
            ТОВАРИ ТОВАРИ ТОВАРИ
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>Кількість товарів:</span>
                <span id="total-count" class="badge">0</span>
            </div>
            <div class="summary-row total">
                <span>Загальна вартість:</span>
                <span id="total-price">0 грн</span>
            </div>
            <button class="checkout-btn">Оформити замовлення</button>
        </div>
    </div>

    <script src="myBasket.js"></script>
</body>

</html>
